<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Terminal Workbench Cursor — ghosts rise from the text you type">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090c0d"/>
      <stop offset="1" stop-color="#0e1214"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- ============ top: wordmark ============ -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,'DejaVu Sans Mono',monospace" text-anchor="middle">
    <text x="600" y="112" font-size="18" font-weight="700" letter-spacing="5" fill="#879994"><tspan fill="#63f2ab">&#10095;</tspan>&#160;OBSIDIAN PLUGIN</text>
    <text x="600" y="176" font-size="40" font-weight="700" letter-spacing="6" fill="#b4c3bd">TERMINAL WORKBENCH</text>
    <text x="600" y="262" font-size="90" font-weight="700" letter-spacing="4" fill="#63f2ab">CURSOR</text>
    <line x1="360" y1="298" x2="840" y2="298" stroke="#2a363d" stroke-width="2"/>
    <text x="600" y="342" font-size="18" font-weight="600" letter-spacing="5" fill="#879994">GHOSTS RISE FROM THE TEXT YOU TYPE</text>
  </g>

  <!-- ============ middle: editor pane with a ghost trail ============ -->
  <!-- pane -->
  <rect x="300" y="384" width="600" height="300" rx="12" fill="#0e1214" stroke="#2a363d" stroke-width="1.5"/>
  <line x1="300" y1="426" x2="900" y2="426" stroke="#2a363d" stroke-width="1.5"/>
  <circle cx="330" cy="405" r="5" fill="#39484f"/>
  <circle cx="348" cy="405" r="5" fill="#39484f"/>
  <circle cx="366" cy="405" r="5" fill="#39484f"/>
  <text x="392" y="411" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="12" font-weight="700" letter-spacing="2.5" fill="#879994">EDITOR &#8212; GHOST TRAIL</text>

  <!-- text lines (words as pills) -->
  <g>
    <!-- line 1 -->
    <rect x="336" y="466" width="120" height="9" rx="4.5" fill="#63736f" opacity="0.55"/>
    <rect x="470" y="466" width="70" height="9" rx="4.5" fill="#63736f" opacity="0.55"/>
    <rect x="556" y="466" width="150" height="9" rx="4.5" fill="#63736f" opacity="0.5"/>
    <!-- line 2 -->
    <rect x="336" y="504" width="92" height="9" rx="4.5" fill="#63736f" opacity="0.5"/>
    <rect x="444" y="504" width="176" height="9" rx="4.5" fill="#63736f" opacity="0.45"/>
    <rect x="636" y="504" width="60" height="9" rx="4.5" fill="#63736f" opacity="0.45"/>
    <!-- active line: brighter words + block caret where the ghost is born -->
    <rect x="336" y="556" width="64" height="10" rx="5" fill="#b4c3bd"/>
    <rect x="414" y="556" width="112" height="10" rx="5" fill="#b4c3bd"/>
    <rect x="540" y="549" width="12" height="24" rx="1.5" fill="#63f2ab"/>
    <!-- lines below, fading -->
    <rect x="336" y="604" width="140" height="9" rx="4.5" fill="#63736f" opacity="0.32"/>
    <rect x="490" y="604" width="88" height="9" rx="4.5" fill="#63736f" opacity="0.3"/>
    <rect x="336" y="640" width="104" height="9" rx="4.5" fill="#63736f" opacity="0.2"/>
    <rect x="454" y="640" width="120" height="9" rx="4.5" fill="#63736f" opacity="0.18"/>
  </g>

  <!-- rising ghosts (Terminal Workbench Pet, native 16x16 path), fading up the accent ramp -->
  <g>
    <!-- g1: just off the caret -->
    <g transform="translate(524 524) scale(1.5)" opacity="0.95">
      <path d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z" fill="#63f2ab"/>
      <rect x="5" y="6" width="2" height="3" fill="#0e1214"/><rect x="9" y="6" width="2" height="3" fill="#0e1214"/>
    </g>
    <!-- g2 -->
    <g transform="translate(506 482) scale(1.3)" opacity="0.78">
      <path d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z" fill="#6bdcff"/>
      <rect x="5" y="6" width="2" height="3" fill="#0e1214"/><rect x="9" y="6" width="2" height="3" fill="#0e1214"/>
    </g>
    <!-- g3 -->
    <g transform="translate(492 442) scale(1.05)" opacity="0.55">
      <path d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z" fill="#f0c674"/>
      <rect x="5" y="6" width="2" height="3" fill="#0e1214"/><rect x="9" y="6" width="2" height="3" fill="#0e1214"/>
    </g>
    <!-- g4 -->
    <g transform="translate(480 404) scale(0.85)" opacity="0.38">
      <path d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z" fill="#b78cff"/>
      <rect x="5" y="6" width="2" height="3" fill="#0e1214"/><rect x="9" y="6" width="2" height="3" fill="#0e1214"/>
    </g>
    <!-- g5: escaping above the pane -->
    <g transform="translate(466 360) scale(0.7)" opacity="0.22">
      <path d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z" fill="#63f2ab"/>
      <rect x="5" y="6" width="2" height="3" fill="#0e1214"/><rect x="9" y="6" width="2" height="3" fill="#0e1214"/>
    </g>
  </g>

  <!-- bottom prompt line -->
  <text x="600" y="762" text-anchor="middle" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="16" fill="#63736f"><tspan fill="#63f2ab" font-weight="700">&#10095;</tspan> cursor --ghost-trail on <tspan fill="#63f2ab">&#9612;</tspan></text>
</svg>
